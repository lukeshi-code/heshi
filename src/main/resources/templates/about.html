<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于我们 - 和石科技</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page-glow page-glow-one"></div>
<div class="page-glow page-glow-two"></div>
<div class="shell">
    <header class="nav">
        <div>
            <div class="brand">和石科技</div>
            <div class="brand-sub">ABOUT THE COMPANY</div>
        </div>
        <div class="nav-actions">
            <a th:each="m : ${navMenus}"
               th:href="${m.resolvedUrl}"
               th:attr="target=${m.openInNewWindow ? '_blank' : null},rel=${m.openInNewWindow ? 'noopener noreferrer' : null}"
               th:text="${m.menuName}"></a>
        </div>
    </header>

    <section class="page-hero">
        <div class="eyebrow">About</div>
        <h1>我们专注企业级产品与运营后台建设</h1>
        <p class="lead">围绕真实业务场景，提供从前台展示到后台管理的完整方案，让项目上线后可持续迭代。</p>
    </section>

    <section class="grid two">
        <div class="card">
            <h2>公司简介</h2>
            <p class="copy">和石科技聚焦企业官网、用户系统、内容平台和可视化后台，帮助团队减少重复开发成本，快速建立可运营的数字化系统。</p>
        </div>
        <div class="card">
            <h2>工作方式</h2>
            <div class="list feature-list">
                <div><span>务实</span><strong>以业务目标驱动功能设计</strong></div>
                <div><span>协同</span><strong>产品、设计、开发联合推进</strong></div>
                <div><span>长期</span><strong>预留演进能力，避免一次性项目</strong></div>
            </div>
        </div>
    </section>
</div>
</body>
</html>
