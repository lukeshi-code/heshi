<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="shell">
    <div class="card">
        <div class="section-head">
            <h1>用户管理</h1>
            <div>
                <a class="text-link" th:href="@{/admin/visual-pages}">页面与等级管理</a>
                <a class="text-link" th:href="@{/}">返回首页</a>
            </div>
        </div>
        <div class="error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
        <div class="admin-list-wrap">
            <table class="admin-list-table">
                <thead>
                <tr>
                    <th>用户</th>
                    <th>邮箱</th>
                    <th>角色权限</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td>
                        <div class="admin-user">
                            <strong th:text="${user.displayName}"></strong>
                            <span th:text="${'@' + user.username}"></span>
                        </div>
                    </td>
                    <td th:text="${user.email}"></td>
                    <td>
                        <form class="admin-inline-form" th:action="@{'/admin/users/' + ${user.id} + '/roles'}" method="post">
                            <label class="admin-check" th:each="role : ${allRoles}">
                                <input type="checkbox" name="roles" th:value="${role.name()}" th:checked="${user.roles.contains(role)}">
                                <span th:text="${role.name()}"></span>
                            </label>
                            <button class="primary" type="submit">保存</button>
                        </form>
                    </td>
                    <td><span class="muted">实时生效</span></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
