<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理工作台</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="admin-proto-body">
<div class="admin-proto-shell">
    <aside class="admin-proto-sidebar">
        <div class="admin-proto-logo">网站后台管理</div>
        <div class="admin-proto-menu">
            <div class="item">仪表盘</div>
            <div class="item active">页面管理</div>
            <div class="item">内容管理</div>
            <div class="item">模块管理</div>
            <div class="item">资源库</div>
            <div class="item">导航管理</div>
            <div class="item">主题设置</div>
            <div class="item">用户权限</div>
            <div class="item">数据统计</div>
            <div class="item">系统设置</div>
        </div>
    </aside>

    <main class="admin-proto-main">
        <header class="admin-proto-header">
            <div>
                <div class="title">页面管理 / 可视化装修</div>
                <div class="desc">支持每个页面编辑、排序、样式配置与发布</div>
            </div>
            <div class="admin-proto-header-actions">
                <button class="secondary" type="button" onclick="saveAsDraft()">保存草稿</button>
                <button class="secondary" type="button" onclick="scrollToPreview()">预览</button>
                <button class="primary" type="button" onclick="publishPage()">发布页面</button>
                <a class="secondary button-link" th:href="@{/admin/users}">用户管理</a>
            </div>
        </header>

        <div class="notice" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <section class="admin-proto-grid">
            <div class="admin-proto-card admin-proto-canvas">
                <div class="head">
                    <h2>页面结构画布</h2>
                    <div>
                        <button class="secondary" type="button" onclick="moveSelected(-1)">上移</button>
                        <button class="secondary" type="button" onclick="moveSelected(1)">下移</button>
                    </div>
                </div>

                <div id="pageCanvas" class="admin-page-list">
                    <div class="admin-page-item"
                         th:each="p, stat : ${pages}"
                         th:attr="data-id=${p.id},
                                  data-page-name=${p.pageName},
                                  data-route-path=${p.routePath},
                                  data-nav-order=${p.navOrder},
                                  data-nav-visible=${p.navVisible},
                                  data-enabled=${p.enabled},
                                  data-layout-mode=${p.layoutMode.name()},
                                  data-hero-title=${p.heroTitle},
                                  data-hero-subtitle=${p.heroSubtitle},
                                  data-banner-image-url=${p.bannerImageUrl},
                                  data-hero-primary-button-text=${p.heroPrimaryButtonText},
                                  data-hero-primary-button-link=${p.heroPrimaryButtonLink},
                                  data-hero-secondary-button-text=${p.heroSecondaryButtonText},
                                  data-hero-secondary-button-link=${p.heroSecondaryButtonLink},
                                  data-required-level=${pageLevelByPath[p.routePath]}"
                         th:classappend="${stat.index == 0} ? ' selected'">
                        <div>
                            <div class="name" th:text="${(stat.index + 1) + '. ' + p.pageName}"></div>
                            <div class="meta" th:text="${'路径：' + p.routePath}"></div>
                        </div>
                        <div class="badge" th:text="${p.enabled ? '已启用' : '未启用'}"></div>
                    </div>
                </div>
            </div>

            <div class="admin-proto-side">
                <div class="admin-proto-card">
                    <h2>页面配置面板</h2>
                    <form id="pageEditorForm" class="auth-form js-submit-lock" method="post">
                        <input type="hidden" id="actionTypeField" name="actionType" value="save">
                        <label>页面名称
                            <input id="fPageName" type="text" name="pageName" required>
                        </label>
                        <label>导航排序
                            <input id="fNavOrder" type="number" name="navOrder" min="0" required>
                        </label>
                        <div class="grid two" style="margin:0;">
                            <label>布局模式
                                <select id="fLayoutMode" name="layoutMode">
                                    <option th:each="mode : ${allLayoutModes}" th:value="${mode.name()}" th:text="${mode.label}"></option>
                                </select>
                            </label>
                            <label>页面等级
                                <select id="fRequiredLevel" name="requiredLevel">
                                    <option th:each="level : ${allLevels}" th:value="${level.name()}" th:text="${level.label}"></option>
                                </select>
                            </label>
                        </div>
                        <label>Banner 图 URL
                            <input id="fBannerImageUrl" type="text" name="bannerImageUrl">
                        </label>
                        <label>主标题
                            <input id="fHeroTitle" type="text" name="heroTitle">
                        </label>
                        <label>副标题
                            <textarea id="fHeroSubtitle" name="heroSubtitle" rows="3"></textarea>
                        </label>
                        <div class="grid two" style="margin:0;">
                            <label>主按钮文案
                                <input id="fHeroPrimaryButtonText" type="text" name="heroPrimaryButtonText">
                            </label>
                            <label>主按钮链接
                                <input id="fHeroPrimaryButtonLink" type="text" name="heroPrimaryButtonLink">
                            </label>
                        </div>
                        <div class="grid two" style="margin:0;">
                            <label>次按钮文案
                                <input id="fHeroSecondaryButtonText" type="text" name="heroSecondaryButtonText">
                            </label>
                            <label>次按钮链接
                                <input id="fHeroSecondaryButtonLink" type="text" name="heroSecondaryButtonLink">
                            </label>
                        </div>
                        <div class="grid two" style="margin:0;">
                            <label class="admin-check">
                                <input id="fNavVisible" type="checkbox" name="navVisible">
                                <span>导航显示</span>
                            </label>
                            <label class="admin-check">
                                <input id="fEnabled" type="checkbox" name="enabled">
                                <span>页面启用</span>
                            </label>
                        </div>
                        <div class="button-row">
                            <button class="primary" type="submit">保存当前页面</button>
                        </div>
                    </form>
                </div>

                <div id="pagePreviewCard" class="admin-proto-card">
                    <h2>页面预览</h2>
                    <div class="admin-proto-preview">
                        <div id="previewBanner" class="banner">Banner 区域</div>
                        <div class="body">
                            <strong id="previewTitle">页面标题</strong>
                            <p id="previewSubtitle">页面副标题</p>
                            <div class="hero-actions" style="margin:0;">
                                <span id="previewBtn1" class="secondary">主按钮</span>
                                <span id="previewBtn2" class="secondary">次按钮</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="card" style="margin-top:16px;">
            <div class="section-head">
                <h2>最近操作日志</h2>
            </div>
            <div class="list">
                <div th:if="${logs == null or #lists.isEmpty(logs)}">
                    <strong>暂无日志</strong>
                    <span>进行配置变更后会自动记录。</span>
                </div>
                <div th:each="log : ${logs}">
                    <strong th:text="${log.action + ' / ' + log.target}"></strong>
                    <span th:text="${log.operatorName + ' @ ' + #temporals.format(log.createdAt, 'yyyy-MM-dd HH:mm:ss')}"></span>
                </div>
            </div>
        </section>
    </main>
</div>

<script>
let selectedPageEl = null;

function q(id) { return document.getElementById(id); }
function safe(v, d) { return v == null || String(v).trim() === "" ? d : String(v); }
function b(v) { return String(v).toLowerCase() === "true"; }

function bindCanvasSelect() {
  document.querySelectorAll(".admin-page-item").forEach((item) => {
    item.addEventListener("click", () => selectPage(item));
  });
  const first = document.querySelector(".admin-page-item.selected") || document.querySelector(".admin-page-item");
  if (first) selectPage(first);
}

function selectPage(item) {
  if (selectedPageEl) selectedPageEl.classList.remove("selected");
  selectedPageEl = item;
  item.classList.add("selected");

  q("fPageName").value = safe(item.dataset.pageName, "");
  q("fNavOrder").value = safe(item.dataset.navOrder, "0");
  q("fLayoutMode").value = safe(item.dataset.layoutMode, "SIMPLE");
  q("fRequiredLevel").value = safe(item.dataset.requiredLevel, "PUBLIC");
  q("fBannerImageUrl").value = safe(item.dataset.bannerImageUrl, "");
  q("fHeroTitle").value = safe(item.dataset.heroTitle, "");
  q("fHeroSubtitle").value = safe(item.dataset.heroSubtitle, "");
  q("fHeroPrimaryButtonText").value = safe(item.dataset.heroPrimaryButtonText, "");
  q("fHeroPrimaryButtonLink").value = safe(item.dataset.heroPrimaryButtonLink, "");
  q("fHeroSecondaryButtonText").value = safe(item.dataset.heroSecondaryButtonText, "");
  q("fHeroSecondaryButtonLink").value = safe(item.dataset.heroSecondaryButtonLink, "");
  q("fNavVisible").checked = b(item.dataset.navVisible);
  q("fEnabled").checked = b(item.dataset.enabled);

  q("pageEditorForm").action = "/admin/visual-pages/" + item.dataset.id;
  renderPreview();
}

function renderPreview() {
  q("previewTitle").textContent = safe(q("fHeroTitle").value, safe(q("fPageName").value, "页面标题"));
  q("previewSubtitle").textContent = safe(q("fHeroSubtitle").value, "页面副标题");
  q("previewBtn1").textContent = safe(q("fHeroPrimaryButtonText").value, "主按钮");
  q("previewBtn2").textContent = safe(q("fHeroSecondaryButtonText").value, "次按钮");
  const banner = q("previewBanner");
  const bannerUrl = safe(q("fBannerImageUrl").value, "");
  if (bannerUrl) {
    banner.style.backgroundImage = "url('" + bannerUrl.replace(/'/g, "%27") + "')";
    banner.style.backgroundSize = "cover";
    banner.style.backgroundPosition = "center";
    banner.textContent = "";
  } else {
    banner.style.backgroundImage = "none";
    banner.style.background = "#0f172a";
    banner.textContent = "Banner 区域";
  }
}

function moveSelected(step) {
  if (!selectedPageEl) return;
  const parent = selectedPageEl.parentNode;
  if (step < 0 && selectedPageEl.previousElementSibling) {
    parent.insertBefore(selectedPageEl, selectedPageEl.previousElementSibling);
  } else if (step > 0 && selectedPageEl.nextElementSibling) {
    parent.insertBefore(selectedPageEl.nextElementSibling, selectedPageEl);
  }
  resetOrderAfterMove();
}

function resetOrderAfterMove() {
  const items = document.querySelectorAll(".admin-page-item");
  items.forEach((item, idx) => {
    item.dataset.navOrder = String(idx + 1);
    const name = safe(item.dataset.pageName, "页面");
    const nameEl = item.querySelector(".name");
    if (nameEl) nameEl.textContent = (idx + 1) + ". " + name;
  });
  if (selectedPageEl) q("fNavOrder").value = selectedPageEl.dataset.navOrder || "1";
}

function saveAsDraft() {
  q("actionTypeField").value = "draft";
  q("pageEditorForm").requestSubmit();
}

function publishPage() {
  q("actionTypeField").value = "publish";
  q("pageEditorForm").requestSubmit();
}

function scrollToPreview() {
  q("pagePreviewCard").scrollIntoView({ behavior: "smooth", block: "start" });
}

function bindFormPreview() {
  document.querySelectorAll("#pageEditorForm input, #pageEditorForm textarea, #pageEditorForm select").forEach((el) => {
    el.addEventListener("input", renderPreview);
    el.addEventListener("change", renderPreview);
  });
}

function bindSubmitLock() {
  document.querySelectorAll(".js-submit-lock").forEach((form) => {
    form.addEventListener("submit", () => {
      form.querySelectorAll('button[type="submit"]').forEach((btn) => {
        btn.disabled = true;
        btn.textContent = "保存中...";
      });
    });
  });
}

bindCanvasSelect();
bindFormPreview();
bindSubmitLock();
</script>
</body>
</html>
