<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理工作台</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="admin-proto-body">
<div class="admin-proto-shell">
    <aside class="admin-proto-sidebar">
        <div class="admin-proto-logo">网站后台管理</div>
        <div class="admin-proto-menu">
            <div class="item">仪表盘</div>
            <div class="item active">页面管理</div>
            <div class="item">内容管理</div>
            <div class="item">模块管理</div>
            <div class="item">资源库</div>
            <div class="item">导航管理</div>
            <div class="item">主题设置</div>
            <div class="item">用户权限</div>
            <div class="item">数据统计</div>
            <div class="item">系统设置</div>
        </div>
    </aside>

    <main class="admin-proto-main">
        <header class="admin-proto-header">
            <div>
                <div class="title">页面管理 / 可视化装修</div>
                <div class="desc">菜单管理、模块配置、模板复用都在同一工作台完成</div>
            </div>
            <div class="admin-proto-header-actions">
                <a class="secondary button-link" th:href="@{/admin/users}">用户管理</a>
                <a class="secondary button-link" th:href="@{/}">返回首页</a>
            </div>
        </header>

        <div class="notice" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="error" th:if="${errorMessage}" th:text="${errorMessage}" style="margin-top: 12px;"></div>

        <section class="admin-proto-grid">
            <div class="admin-proto-card">
                <div class="head">
                    <h2>菜单管理（树状结构）</h2>
                    <form class="admin-inline-form js-submit-lock" th:action="@{/admin/menus/create}" method="post">
                        <input type="text" name="menuName" placeholder="新菜单名称">
                        <button class="primary" type="submit">新增菜单</button>
                    </form>
                </div>
                <form id="menuBatchForm" class="js-submit-lock" th:action="@{/admin/menus/batch}" method="post">
                    <div class="muted">拖拽可调整排序；拖到目标菜单右侧可变成其子菜单，拖到左侧恢复一级菜单。</div>
                    <div class="admin-list-wrap" style="margin-top:10px;">
                        <table class="admin-list-table">
                            <thead>
                            <tr>
                                <th>菜单名称</th>
                                <th>父级</th>
                                <th>跳转类型</th>
                                <th>内部页面</th>
                                <th>外部链接</th>
                                <th>显示</th>
                                <th>打开方式</th>
                                <th>排序</th>
                            </tr>
                            </thead>
                            <tbody id="menuTbody">
                            <tr th:each="m : ${menuItems}" class="menu-row" draggable="true" th:attr="data-id=${m.id}">
                                <td>
                                    <input type="hidden" name="menuId" th:value="${m.id}">
                                    <input type="text" name="menuName" th:value="${m.menuName}" required>
                                </td>
                                <td>
                                    <select class="menu-parent-select" name="parentId">
                                        <option value="0" th:selected="${m.parentId == null}">一级菜单</option>
                                        <option th:each="p : ${menuItems}" th:if="${p.id != m.id}" th:value="${p.id}" th:selected="${m.parentId == p.id}" th:text="${p.menuName}"></option>
                                    </select>
                                </td>
                                <td>
                                    <select name="linkType">
                                        <option th:each="linkTypeItem : ${T(org.example.model.LinkType).values()}" th:value="${linkTypeItem.name()}" th:selected="${m.linkType == linkTypeItem}" th:text="${linkTypeItem.label}"></option>
                                    </select>
                                </td>
                                <td><input type="text" name="internalPath" th:value="${m.internalPath}" placeholder="/about"></td>
                                <td><input type="text" name="externalUrl" th:value="${m.externalUrl}" placeholder="https://example.com"></td>
                                <td>
                                    <select name="visible">
                                        <option value="true" th:selected="${m.visible}">显示</option>
                                        <option value="false" th:selected="${!m.visible}">隐藏</option>
                                    </select>
                                </td>
                                <td>
                                    <select name="openInNewWindow">
                                        <option value="false" th:selected="${!m.openInNewWindow}">当前页</option>
                                        <option value="true" th:selected="${m.openInNewWindow}">新窗口</option>
                                    </select>
                                </td>
                                <td><input class="menu-sort-input" type="number" name="sortOrder" min="1" th:value="${m.sortOrder}"></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="button-row" style="margin-top:12px;">
                        <button class="primary" type="submit">保存菜单配置</button>
                    </div>
                </form>
            </div>

            <div class="admin-proto-card">
                <h2>模块新增</h2>
                <form class="auth-form js-submit-lock" th:action="@{/admin/modules/create}" method="post">
                    <label>所属页面
                        <select name="pagePath">
                            <option th:each="p : ${pages}" th:value="${p.routePath}" th:text="${p.pageName + ' (' + p.routePath + ')'}"></option>
                        </select>
                    </label>
                    <label>模块名称
                        <input type="text" name="title" placeholder="例如：品牌介绍">
                    </label>
                    <label>模块类型
                        <select name="moduleType">
                            <option th:each="mt : ${allModuleTypes}" th:value="${mt.name()}" th:text="${mt.label}"></option>
                        </select>
                    </label>
                    <button class="primary" type="submit">新增模块</button>
                </form>
            </div>
        </section>

        <section class="card" style="margin-top:16px;">
            <div class="section-head">
                <h2>模块管理（样式配置 / 数据源 / 模板复用）</h2>
            </div>
            <div class="module-config-list">
                <div class="module-config-card" th:each="m : ${allModules}">
                    <div class="section-head">
                        <strong th:text="${m.title + '  (' + m.pagePath + ')'}"></strong>
                        <span class="badge" th:text="${m.enabled ? '已启用' : '未启用'}"></span>
                    </div>
                    <form class="auth-form js-submit-lock" th:action="@{'/admin/modules/' + ${m.id} + '/advanced'}" method="post">
                        <div class="grid two" style="margin:0;">
                            <label>模块名称
                                <input type="text" name="title" th:value="${m.title}" required>
                            </label>
                            <label>模块类型
                                <select name="moduleType">
                                    <option th:each="mt : ${allModuleTypes}" th:value="${mt.name()}" th:selected="${m.moduleType == mt}" th:text="${mt.label}"></option>
                                </select>
                            </label>
                        </div>
                        <label>模块内容
                            <textarea name="content" rows="2" th:text="${m.content}"></textarea>
                        </label>
                        <div class="grid two" style="margin:0;">
                            <label>按钮文案
                                <input type="text" name="buttonText" th:value="${m.buttonText}">
                            </label>
                            <label>按钮链接
                                <input type="text" name="buttonLink" th:value="${m.buttonLink}">
                            </label>
                        </div>
                        <div class="grid two" style="margin:0;">
                            <label>数据来源
                                <select name="dataSourceType">
                                    <option th:each="ds : ${allDataSourceTypes}" th:value="${ds.name()}" th:selected="${m.dataSourceType == ds}" th:text="${ds.label}"></option>
                                </select>
                            </label>
                            <label>对齐方式
                                <select name="textAlign">
                                    <option value="left" th:selected="${m.textAlign == 'left'}">左对齐</option>
                                    <option value="center" th:selected="${m.textAlign == 'center'}">居中</option>
                                    <option value="right" th:selected="${m.textAlign == 'right'}">右对齐</option>
                                </select>
                            </label>
                        </div>
                        <div class="grid two" style="margin:0;">
                            <label>背景色
                                <input type="text" name="backgroundColor" th:value="${m.backgroundColor}">
                            </label>
                            <label>背景图 URL
                                <input type="text" name="backgroundImageUrl" th:value="${m.backgroundImageUrl}">
                            </label>
                        </div>
                        <div class="grid three" style="margin:0;">
                            <label>字体颜色
                                <input type="text" name="fontColor" th:value="${m.fontColor}">
                            </label>
                            <label>字体大小
                                <input type="text" name="fontSize" th:value="${m.fontSize}">
                            </label>
                            <label>排序
                                <input type="number" name="sortOrder" min="1" th:value="${m.sortOrder}">
                            </label>
                        </div>
                        <label>显示状态
                            <select name="enabled">
                                <option value="true" th:selected="${m.enabled}">显示</option>
                                <option value="false" th:selected="${!m.enabled}">隐藏</option>
                            </select>
                        </label>
                        <button class="primary" type="submit">保存模块配置</button>
                    </form>
                    <div class="grid two" style="margin-top:10px;">
                        <form class="js-submit-lock" th:action="@{'/admin/modules/' + ${m.id} + '/save-template'}" method="post">
                            <label>模板名称
                                <input type="text" name="templateName" th:value="${m.templateName}" placeholder="模板名">
                            </label>
                            <button class="secondary" type="submit">保存模板</button>
                        </form>
                        <form class="js-submit-lock" th:action="@{'/admin/modules/' + ${m.id} + '/apply-template'}" method="post">
                            <label>套用模板
                                <select name="sourceTemplateId">
                                    <option th:each="t : ${moduleTemplates}" th:value="${t.id}" th:text="${t.templateName + ' / ' + t.pagePath}"></option>
                                </select>
                            </label>
                            <button class="secondary" type="submit">一键替换模块</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>

        <section class="card" style="margin-top:16px;">
            <div class="section-head">
                <h2>最近操作日志</h2>
            </div>
            <div class="list">
                <div th:if="${logs == null or #lists.isEmpty(logs)}">
                    <strong>暂无日志</strong>
                    <span>进行配置变更后会自动记录。</span>
                </div>
                <div th:each="log : ${logs}">
                    <strong th:text="${log.action + ' / ' + log.target}"></strong>
                    <span th:text="${log.operatorName + ' @ ' + #temporals.format(log.createdAt, 'yyyy-MM-dd HH:mm:ss')}"></span>
                </div>
            </div>
        </section>
    </main>
</div>

<script>
function bindSubmitLock() {
  document.querySelectorAll(".js-submit-lock").forEach((form) => {
    form.addEventListener("submit", () => {
      form.querySelectorAll('button[type="submit"]').forEach((btn) => {
        btn.disabled = true;
        if (!btn.dataset.oldText) btn.dataset.oldText = btn.textContent;
        btn.textContent = "保存中...";
      });
    });
  });
}

function bindMenuDrag() {
  const tbody = document.getElementById("menuTbody");
  if (!tbody) return;
  let dragging = null;
  tbody.querySelectorAll(".menu-row").forEach((row) => {
    row.addEventListener("dragstart", () => {
      dragging = row;
      row.classList.add("dragging");
    });
    row.addEventListener("dragend", () => {
      row.classList.remove("dragging");
      dragging = null;
      resetMenuOrder();
    });
    row.addEventListener("dragover", (e) => {
      e.preventDefault();
      if (!dragging || dragging === row) return;
      const rect = row.getBoundingClientRect();
      const rightHalf = e.clientX > (rect.left + rect.width * 0.55);
      row.classList.toggle("drag-as-child", rightHalf);
      row.classList.toggle("drag-as-sibling", !rightHalf);
    });
    row.addEventListener("dragleave", () => {
      row.classList.remove("drag-as-child");
      row.classList.remove("drag-as-sibling");
    });
    row.addEventListener("drop", (e) => {
      e.preventDefault();
      if (!dragging || dragging === row) return;
      const rect = row.getBoundingClientRect();
      const rightHalf = e.clientX > (rect.left + rect.width * 0.55);
      row.classList.remove("drag-as-child");
      row.classList.remove("drag-as-sibling");
      if (rightHalf) {
        const targetId = row.dataset.id;
        const parentSelect = dragging.querySelector(".menu-parent-select");
        if (parentSelect) parentSelect.value = targetId;
        row.parentNode.insertBefore(dragging, row.nextSibling);
      } else {
        const parentSelect = dragging.querySelector(".menu-parent-select");
        if (parentSelect) parentSelect.value = "0";
        row.parentNode.insertBefore(dragging, row);
      }
      resetMenuOrder();
    });
  });
}

function resetMenuOrder() {
  document.querySelectorAll("#menuTbody .menu-row").forEach((row, idx) => {
    const sortInput = row.querySelector(".menu-sort-input");
    if (sortInput) sortInput.value = String(idx + 1);
  });
}

bindSubmitLock();
bindMenuDrag();
resetMenuOrder();
</script>
</body>
</html>
