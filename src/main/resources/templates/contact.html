<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 - 和石科技</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page-glow page-glow-one"></div>
<div class="page-glow page-glow-two"></div>
<div class="shell">
    <header class="nav">
        <div>
            <div class="brand">和石科技</div>
            <div class="brand-sub">CONTACT & COOPERATION</div>
        </div>
        <div class="nav-actions">
            <a th:each="m : ${navMenus}"
               th:href="${m.resolvedUrl}"
               th:attr="target=${m.openInNewWindow ? '_blank' : null},rel=${m.openInNewWindow ? 'noopener noreferrer' : null}"
               th:text="${m.menuName}"></a>
        </div>
    </header>

    <section class="page-hero">
        <div class="eyebrow">Contact</div>
        <h1>欢迎和我们讨论项目建设与上线计划</h1>
        <p class="lead">如果你希望完善官网、搭建后台、优化权限体系或接入行情模块，欢迎联系。</p>
    </section>

    <section class="grid two">
        <div class="card">
            <h2>联系方式</h2>
            <div class="list feature-list">
                <div><span>服务方向</span><strong>企业官网 / 管理后台 / 内容系统 / 数据可视化</strong></div>
                <div><span>商务邮箱</span><strong>contact@heshitech.com</strong></div>
                <div><span>技术支持</span><strong>support@heshitech.com</strong></div>
                <div><span>合作形式</span><strong>项目制 / 年度技术支持 / 定制开发</strong></div>
            </div>
        </div>

        <div class="card">
            <h2>近期内容</h2>
            <div class="empty" th:if="${articles.isEmpty()}">当前暂无发布内容。</div>
            <div class="article-list" th:unless="${articles.isEmpty()}">
                <a class="article-item" th:each="article, stat : ${articles}" th:if="${stat.index < 3}" th:href="@{'/articles/' + ${article.id}}">
                    <div class="article-top">
                        <strong th:text="${article.title}"></strong>
                        <span th:text="${#temporals.format(article.createdAt, 'MM-dd')}"></span>
                    </div>
                    <p th:text="${#strings.abbreviate(article.content, 70)}"></p>
                </a>
            </div>
        </div>
    </section>
</div>
</body>
</html>
