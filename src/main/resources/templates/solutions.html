<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>解决方案 - 和石科技</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page-glow page-glow-one"></div>
<div class="page-glow page-glow-two"></div>
<div class="shell">
    <header class="nav">
        <div>
            <div class="brand">和石科技</div>
            <div class="brand-sub">SOLUTIONS & SERVICES</div>
        </div>
        <div class="nav-actions">
            <a th:each="m : ${navMenus}"
               th:href="${m.resolvedUrl}"
               th:attr="target=${m.openInNewWindow ? '_blank' : null},rel=${m.openInNewWindow ? 'noopener noreferrer' : null}"
               th:text="${m.menuName}"></a>
        </div>
    </header>

    <section class="page-hero">
        <div class="eyebrow">Solutions</div>
        <h1 th:text="${currentPageConfig != null and currentPageConfig.heroTitle != null and !#strings.isEmpty(currentPageConfig.heroTitle) ? currentPageConfig.heroTitle : '面向企业官网与运营后台的一体化交付'}">面向企业官网与运营后台的一体化交付</h1>
        <p class="lead" th:text="${currentPageConfig != null and currentPageConfig.heroSubtitle != null and !#strings.isEmpty(currentPageConfig.heroSubtitle) ? currentPageConfig.heroSubtitle : '覆盖账号体系、权限控制、页面可视化管理、内容发布与运维监控，支持快速上线和持续优化。'}">覆盖账号体系、权限控制、页面可视化管理、内容发布与运维监控，支持快速上线和持续优化。</p>
    </section>

    <section class="grid three">
        <article class="card feature-card">
            <span class="card-index">A1</span>
            <h3>官网建设升级</h3>
            <p>提供响应式页面、栏目管理、内容发布和 SEO 基础能力。</p>
        </article>
        <article class="card feature-card">
            <span class="card-index">A2</span>
            <h3>用户与权限系统</h3>
            <p>支持角色分级、页面等级权限、后台统一配置和访问控制。</p>
        </article>
        <article class="card feature-card">
            <span class="card-index">A3</span>
            <h3>行情与分析模块</h3>
            <p>支持股票查询、分时与 K 线展示、真实与模拟数据对比扩展。</p>
        </article>
    </section>
</div>
</body>
</html>
