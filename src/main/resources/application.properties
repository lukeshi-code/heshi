server.port=8080
spring.thymeleaf.cache=false
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.datasource.url=jdbc:h2:file:./data/heshicapital
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.compression.enabled=true
server.compression.mime-types=text/html,text/plain,text/css,application/javascript,application/json
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
app.upload-dir=./uploads
app.tencent-quote-url=https://qt.gtimg.cn/q=
app.tencent-minute-url=https://web.ifzq.gtimg.cn/appstock/app/minute/query?code=
app.tencent-kline-url=https://web.ifzq.gtimg.cn/appstock/app/fqkline/get?param=
app.akshare-bridge-url=http://127.0.0.1:5005/quote?code=
